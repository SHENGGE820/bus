<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>通勤模擬器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 16px 12px 32px;
    }

    /* ── 頂部 ETA ── */
    .eta-bar {
      text-align: center;
      padding: 20px 0 16px;
      margin-bottom: 16px;
      border-bottom: 1px solid #222;
    }
    .eta-label { font-size: 12px; color: #666; letter-spacing: 1px; text-transform: uppercase; }
    .eta-time  { font-size: 52px; font-weight: 700; color: #fff; line-height: 1.1; margin: 4px 0; }
    .eta-sub   { font-size: 13px; color: #555; }

    /* ── 按鈕 ── */
    .btn {
      display: block; width: 100%; padding: 18px;
      border: none; border-radius: 14px; font-size: 18px; font-weight: 700;
      cursor: pointer; margin-bottom: 12px; transition: opacity .15s;
    }
    .btn:active { opacity: .75; }
    .btn-depart  { background: #2196F3; color: #fff; }
    .btn-board   { background: #4CAF50; color: #fff; }
    .btn-reset   { background: #333; color: #888; font-size: 14px; padding: 12px; }
    .btn-hidden  { display: none; }

    /* ── Timeline ── */
    .timeline { position: relative; }
    .leg {
      display: flex; gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid #1a1a1a;
      position: relative;
    }
    .leg:last-child { border-bottom: none; }

    /* 左側圓點 + 線 */
    .leg-dot-col { width: 32px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; }
    .dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: #333; border: 2px solid #444;
      flex-shrink: 0; margin-top: 3px; z-index: 1;
    }
    .dot.done     { background: #4CAF50; border-color: #4CAF50; }
    .dot.active   { background: #2196F3; border-color: #2196F3; animation: pulse 1.4s infinite; }
    .dot.waiting  { background: #FF9800; border-color: #FF9800; animation: pulse 1.4s infinite; }
    .line { width: 2px; flex: 1; background: #222; margin-top: 4px; }
    .line.done { background: #4CAF50; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(33,150,243,.5); }
      50%       { box-shadow: 0 0 0 6px rgba(33,150,243,0); }
    }

    /* 右側內容 */
    .leg-body { flex: 1; min-width: 0; }
    .leg-name  { font-size: 15px; font-weight: 600; color: #ccc; }
    .leg-name.done    { color: #4CAF50; }
    .leg-name.active  { color: #fff; }
    .leg-meta { font-size: 12px; color: #555; margin-top: 2px; }
    .leg-info { font-size: 13px; color: #999; margin-top: 5px; }
    .leg-info.active  { color: #2196F3; }
    .leg-info.waiting { color: #FF9800; }
    .leg-info.done    { color: #4CAF50; }
    .leg-times {
      font-size: 12px; color: #555; margin-top: 4px;
      display: flex; gap: 8px;
    }
    .leg-stop {
      display: inline-block;
      background: #1a2a1a; color: #66bb6a;
      font-size: 11px; padding: 2px 8px;
      border-radius: 99px; margin-top: 5px;
    }

    /* ── icon ── */
    .type-icon { font-size: 16px; margin-right: 4px; }

    .updated { text-align: center; font-size: 11px; color: #333; margin-top: 20px; }
  </style>
</head>
<body>

<div class="eta-bar">
  <div class="eta-label">預計抵達</div>
  <div class="eta-time" id="eta">--:--</div>
  <div class="eta-sub" id="eta-sub">按下出發開始模擬</div>
</div>

<button class="btn btn-depart" id="btn-depart" onclick="depart()">出發！</button>
<button class="btn btn-board  btn-hidden" id="btn-board" onclick="board()">我上車了 ✓</button>
<button class="btn btn-reset" id="btn-reset" onclick="reset()">重設行程</button>

<div class="timeline" id="timeline"></div>
<div class="updated" id="updated"></div>

<script>
  const ICONS = { walk: "🚶", metro: "🚇", bus: "🚌" };

  let data = null;

  async function fetchStatus() {
    try {
      const r = await fetch("/status");
      data = await r.json();
      render();
    } catch(e) {
      document.getElementById("updated").textContent = "⚠ 連線失敗";
    }
  }

  async function depart() {
    await fetch("/depart", { method: "POST" });
    fetchStatus();
  }

  async function board() {
    await fetch("/board", { method: "POST" });
    fetchStatus();
  }

  async function reset() {
    await fetch("/reset", { method: "POST" });
    fetchStatus();
  }

  function statusClass(s) {
    if (s === "completed") return "done";
    if (s === "on_board")  return "active";
    if (s === "walking")   return "active";
    if (s === "waiting")   return "waiting";
    return "";
  }

  function render() {
    if (!data) return;

    // ETA
    document.getElementById("eta").textContent = data.eta_str || "--:--";

    const cur = data.current_leg;
    const running = data.running;

    // 狀態副標題
    if (!running && cur === -1 && data.legs.every(l => l.status === "pending")) {
      document.getElementById("eta-sub").textContent = "按下出發開始模擬";
    } else if (!running) {
      document.getElementById("eta-sub").textContent = "✅ 已抵達目的地！";
    } else {
      const leg = data.legs[cur];
      if (leg) {
        let sub = "";
        if (leg.status === "walking") sub = `步行中：${leg.name}`;
        else if (leg.status === "waiting") sub = `等車中：${leg.name}`;
        else if (leg.status === "on_board") sub = `行駛中：${leg.name}`;
        document.getElementById("eta-sub").textContent = sub;
      }
    }

    // 按鈕顯示
    const btnDepart = document.getElementById("btn-depart");
    const btnBoard  = document.getElementById("btn-board");
    btnDepart.classList.toggle("btn-hidden", running);
    btnBoard.classList.toggle("btn-hidden", true);
    if (running && cur >= 0) {
      const leg = data.legs[cur];
      if (leg && leg.status === "waiting") {
        btnBoard.classList.remove("btn-hidden");
        btnBoard.textContent = `我上 ${leg.name} 了 ✓`;
      }
    }

    // Timeline
    const tl = document.getElementById("timeline");
    tl.innerHTML = data.legs.map((leg, i) => {
      const sc   = statusClass(leg.status);
      const icon = ICONS[leg.type] || "•";
      const isLast = i === data.legs.length - 1;

      let metaStr = "";
      if (leg.type === "walk") {
        metaStr = `步行 ${leg.est_min} 分`;
      } else if (leg.type === "metro") {
        metaStr = `${leg.from_name} → ${leg.to_name}　約 ${leg.est_min} 分`;
      } else if (leg.type === "bus") {
        metaStr = `${leg.from_stop} → ${leg.to_stop}　約 ${leg.est_min} 分`;
      }

      let infoHtml = "";
      if (leg.info) {
        infoHtml = `<div class="leg-info ${sc}">${leg.info}</div>`;
      }

      let stopHtml = "";
      if (leg.current_stop) {
        stopHtml = `<span class="leg-stop">📍 ${leg.current_stop}</span>`;
      }

      let timesHtml = "";
      if (leg.boarded_at) {
        timesHtml += `<span>上車 ${leg.boarded_at}</span>`;
      }
      if (leg.ended_at) {
        timesHtml += `<span>到站 ${leg.ended_at}</span>`;
      }

      const dotCls = sc === "active" ? "dot active" :
                     sc === "waiting" ? "dot waiting" :
                     sc === "done" ? "dot done" : "dot";
      const lineCls = sc === "done" ? "line done" : "line";

      return `
        <div class="leg">
          <div class="leg-dot-col">
            <div class="${dotCls}"></div>
            ${isLast ? "" : `<div class="${lineCls}"></div>`}
          </div>
          <div class="leg-body">
            <div class="leg-name ${sc}"><span class="type-icon">${icon}</span>${leg.name}</div>
            <div class="leg-meta">${metaStr}</div>
            ${infoHtml}
            ${stopHtml}
            ${timesHtml ? `<div class="leg-times">${timesHtml}</div>` : ""}
          </div>
        </div>`;
    }).join("");

    document.getElementById("updated").textContent = "更新：" + data.updated_at;
  }

  fetchStatus();
  setInterval(fetchStatus, 5000);
</script>
</body>
</html>
