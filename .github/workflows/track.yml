name: 813 公車追蹤

on:
  schedule:
    - cron: '0 23 * * 0-4'   # 早上 07:00 台灣時間（UTC+8）
    - cron: '50 9 * * 1-5'   # 晚上 17:50 台灣時間（UTC+8）
  workflow_dispatch:   # 可以手動觸發測試

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 200   # 早上 07:00 到 10:00，預留啟動與收尾時間

    concurrency:
      group: bus-813-tracker
      cancel-in-progress: false

    permissions:
      contents: write      # 允許把 CSV 結果 commit 回 repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run tracker + live commits
        env:
          TDX_CLIENT_ID: ${{ secrets.TDX_CLIENT_ID }}
          TDX_CLIENT_SECRET: ${{ secrets.TDX_CLIENT_SECRET }}
        run: |
          git config user.name "Bus Tracker Bot"
          git config user.email "bot@noreply.github.com"

          # 每 5 分鐘把 status.json 推上去（讓網頁能看到即時狀態）
          (while true; do
            sleep 300
            [ -f status.json ] && git add status.json
            [ -f travel_log.csv ] && git add travel_log.csv
            git diff --staged --quiet || (git commit -m "live: $(date +'%H:%M')" && git push)
          done) &
          LOOP=$!

          python tracker.py

          kill $LOOP 2>/dev/null || true
          wait $LOOP 2>/dev/null || true

          # 最終結果 commit
          [ -f status.json ] && git add status.json
          [ -f travel_log.csv ] && git add travel_log.csv
          git diff --staged --quiet || git commit -m "done: $(date +'%Y-%m-%d %H:%M')"
          git push
